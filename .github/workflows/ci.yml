name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sakersite_test
          POSTGRES_USER: sakersite
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: Ruff lint
        run: ruff check .
        working-directory: apps/api

      - name: Mypy
        run: mypy api/
        working-directory: apps/api

      - name: Pytest
        run: pytest --cov=api --cov-report=term-missing -v
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://sakersite:testpassword@localhost:5432/sakersite_test
          JWT_SECRET_KEY: test_secret_key
          API_KEY_EDGE: test_edge_key

  web:
    name: Web (lint + typecheck + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  edge:
    name: Edge (ruff + pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/edge/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r apps/edge/requirements-dev.txt

      - name: Ruff lint
        run: ruff check .
        working-directory: apps/edge

      - name: Pytest
        run: pytest -v
        working-directory: apps/edge
        env:
          MOCK_MODE: "true"
          INGEST_API_URL: http://localhost:8000/events/ingest
          INGEST_API_KEY: test_key
